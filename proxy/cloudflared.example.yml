# Cloudflare Tunnel — expose local proxy on *.apps.shribuilds.in
#
# 1. cloudflared tunnel create hostic-proxy
# 2. Copy this file to ~/.cloudflared/config.yml (set tunnel id + credentials-file)
# 3. cloudflared tunnel route dns hostic-proxy apps.shribuilds.in
# 4. cloudflared tunnel route dns hostic-proxy "*.apps.shribuilds.in"
# 5. cloudflared tunnel run hostic-proxy
#
# Requires shribuilds.in on Cloudflare DNS.

tunnel: <TUNNEL_ID>
credentials-file: C:\Users\<you>\.cloudflared\<TUNNEL_ID>.json

ingress:
  - hostname: "*.apps.shribuilds.in"
    service: http://localhost:8080
  - hostname: apps.shribuilds.in
    service: http://localhost:8080
  - service: http_status:404
